spring:
  application:
    name: interview-prep-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3308/interviewprep?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:interviewprep}
    password: ${SPRING_DATASOURCE_PASSWORD:interviewprep123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000
      idle-timeout: 300000
      max-lifetime: 900000
      pool-name: InterviewPrepHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        default_batch_fetch_size: 25
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        type:
          preferred_uuid_jdbc_type: CHAR

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    placeholder-replacement: false

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

app:
  jwt:
    secret: ${JWT_SECRET:your-super-secret-jwt-key-change-in-production-min-32-chars}
    expiration-ms: 86400000   # 24 hours
    refresh-expiration-ms: 604800000  # 7 days

  openai:
    api-key: ${OPENAI_API_KEY:sk-placeholder}
    model: gpt-4o
    max-tokens: 1000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.interviewprep: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
