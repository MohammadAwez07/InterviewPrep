version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: interview-prep-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: interviewprep
      MYSQL_USER: interviewprep
      MYSQL_PASSWORD: interviewprep123
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: interview-prep-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  mysql_data:
